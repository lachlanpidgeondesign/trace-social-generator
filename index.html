<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trace Social Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Literata:opsz,wght@7..72,800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      padding: 16px 32px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 600; color: #f5f5f5; }

    .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .controls label {
      padding: 8px 16px; background: #0f3460; border: 1px solid #1a5276;
      border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
      color: #cbd5e1; transition: background .15s;
    }
    .controls label:hover { background: #1a5276; }
    .controls input[type="file"] { display: none; }

    button {
      padding: 8px 20px; font-size: 13px; font-weight: 700; border: none;
      border-radius: 6px; cursor: pointer; background: #C28A31; color: #fff;
      transition: background .15s;
    }
    button:hover { background: #a87628; }
    button:disabled { opacity: .5; cursor: default; }

    .btn-secondary {
      background: #0f3460; border: 1px solid #1a5276; color: #cbd5e1;
    }
    .btn-secondary:hover { background: #1a5276; }

    .hidden { display: none !important; }

    /* ---- Layout ---- */
    .app-layout {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* ---- Sidebar: image list ---- */
    .sidebar {
      width: 200px;
      min-width: 200px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 10px 14px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: #94a3b8;
      border-bottom: 1px solid #0f3460;
    }
    .sidebar-list {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      border: 2px solid transparent; transition: all .1s;
      background: #111827;
    }
    .sidebar-item:hover { background: #1e293b; }
    .sidebar-item.selected { border-color: #C28A31; background: #1e293b; }
    .sidebar-item img {
      width: 40px; height: 40px; border-radius: 4px; object-fit: cover;
      background: #0f172a;
    }
    .sidebar-item .item-info {
      flex: 1; min-width: 0;
    }
    .sidebar-item .item-name {
      font-size: 11px; font-weight: 600; color: #cbd5e1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-item .item-status {
      font-size: 10px; color: #64748b; margin-top: 2px;
    }
    .sidebar-item .item-status.done { color: #4ade80; }
    .sidebar-item .item-remove {
      background: none; border: none; color: #475569; font-size: 14px;
      cursor: pointer; padding: 2px 4px; line-height: 1;
    }
    .sidebar-item .item-remove:hover { color: #ef4444; }

    /* ---- Main area ---- */
    .main-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      scroll-behavior: smooth;
    }
    .main-empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: #475569; font-size: 14px;
    }

    /* ---- Job card (one per image, stacked vertically) ---- */
    .job-card {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 12px; margin-bottom: 20px; overflow: hidden;
    }
    .job-card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid #0f3460;
      background: #16213e;
    }
    .job-card-header img.job-thumb {
      width: 36px; height: 36px; border-radius: 4px; object-fit: cover;
    }
    .job-card-title {
      flex: 1; min-width: 0; font-size: 14px; font-weight: 700; color: #e2e8f0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; border: 1px solid transparent; border-radius: 4px;
      padding: 2px 6px; transition: border-color .15s;
    }
    .job-card-title:hover { border-color: #334155; }
    .job-card-title:focus {
      outline: none; border-color: #C28A31;
      background: #111827; cursor: text;
      white-space: normal; overflow: visible;
    }
    .job-card-status {
      font-size: 11px; color: #64748b; white-space: nowrap;
    }
    .job-card-status.done { color: #4ade80; }
    .job-card-actions { display: flex; gap: 6px; }
    .job-card-actions button { padding: 4px 12px; font-size: 11px; }
    .job-card-remove {
      background: none; border: none; color: #475569; font-size: 16px;
      cursor: pointer; padding: 2px 6px; line-height: 1;
    }
    .job-card-remove:hover { color: #ef4444; }

    .job-card-body {
      display: flex; gap: 20px; padding: 16px; align-items: flex-start;
      flex-wrap: wrap; background: #111827;
    }

    /* ---- Panels inside job card ---- */
    .panel {
      background: #1e293b; border: 1px solid #0f3460;
      border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
    }
    .panel-header {
      padding: 10px 16px; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px; color: #94a3b8;
      border-bottom: 1px solid #0f3460;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .panel-header button { padding: 4px 12px; font-size: 11px; }
    .panel-body {
      padding: 16px; display: flex; align-items: center; justify-content: center;
      background: #111827;
    }

    /* Input thumbnail in work area */
    .panel-input .panel-body img {
      max-width: 260px; max-height: 260px; border-radius: 4px;
    }

    /* Editor */
    .editor-grid {
      display: inline-grid; gap: 0;
      border: 2px solid #C28A31; border-radius: 6px;
      overflow: hidden; background: #C28A31;
    }
    .editor-grid .ecell {
      width: 42px; height: 42px; display: flex; align-items: center;
      justify-content: center; position: relative; background: #1e293b;
    }
    .editor-grid .ecell.has-tile { background: #2d3a4d; }
    .editor-grid .ecell.active-tile { background: #C28A31; }
    .editor-grid .ecell input {
      width: 28px; height: 28px; border: 2px solid #475569; border-radius: 50%;
      background: #334155; color: #e2e8f0; text-align: center;
      font: bold 14px 'Inter', sans-serif; text-transform: uppercase;
      outline: none; padding: 0;
    }
    .editor-grid .ecell input:focus {
      border-color: #C28A31; box-shadow: 0 0 0 2px rgba(194,138,49,.35);
    }
    .editor-grid .ecell.active-tile input {
      background: #a37528; color: #fff; border-color: #d4a24a;
    }
    .ecell .toggle-type {
      position: absolute; top: 1px; right: 1px;
      width: 14px; height: 14px; border: none; border-radius: 3px;
      font-size: 8px; line-height: 14px; padding: 0; cursor: pointer;
      background: #475569; color: #94a3b8; display: none;
    }
    .ecell:hover .toggle-type, .ecell.has-tile .toggle-type { display: block; }
    .ecell.active-tile .toggle-type { background: #d4a24a; color: #fff; }
    .editor-help {
      margin-top: 10px; font-size: 11px; color: #64748b; line-height: 1.5;
    }

    /* Output preview */
    .panel-output .panel-body { padding: 20px; }
    .panel-output canvas {
      width: 300px; height: 300px; border-radius: 6px;
      image-rendering: high-quality;
    }
  </style>
</head>
<body>
  <header>
    <h1>Trace Social Generator</h1>
    <div class="controls">
      <label for="upload">Add Images</label>
      <input type="file" id="upload" accept="image/*" multiple />
      <button id="scanAllBtn" class="hidden">Scan All</button>
      <button id="generateAllBtn" class="hidden">Generate All</button>
      <button id="exportAllBtn" class="btn-secondary hidden">Export All</button>
    </div>
  </header>

  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-header">Images <span id="imageCount"></span></div>
      <div class="sidebar-list" id="sidebarList"></div>
    </div>

    <div class="main-area" id="mainArea">
      <div class="main-empty" id="emptyState">Upload images to get started</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
